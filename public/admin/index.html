<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kraffe Roasters - CMS</title>
  <!-- Decap CMS CSS - FIXED VERSION -->
  <link href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" rel="stylesheet" type="text/css" />
  <style>
    /* Fallback if CDN fails */
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Initialize Decap CMS manually
    if (typeof window !== 'undefined') {
      window.CMS_MANUAL_INIT = true;
    }
    
    // GitHub OAuth callback handling
    if (window.location.search.includes('code=') && window.location.search.includes('state=')) {
      // If we're coming back from GitHub OAuth
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>
</body>
</html>

backend:
  name: github
  repo: tacibey/kraffe6
  branch: main

# Görsellerin gerçek fiziksel yolu ve kod içindeki görünüm yolu
media_folder: "src/images/blog"
public_folder: "@/images/blog"

collections:
  - name: "blog_en"
    label: "Blog (English)"
    folder: "src/content/blog/en" # Senin onayladığın yol
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "Kraffe Technics" }
      - { label: "Author Image", name: "authorImage", widget: "string", default: "@/images/blog/kraffe-technic.avif" }
      - { label: "Author Image Alt", name: "authorImageAlt", widget: "string", default: "Kraffe Technics Team Avatar" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Card Image", name: "cardImage", widget: "image" }
      - { label: "Card Image Alt", name: "cardImageAlt", widget: "string" }
      - { label: "Read Time (Minutes)", name: "readTime", widget: "number" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "blog_fr"
    label: "Blog (Français)"
    folder: "src/content/blog/fr" # Senin onayladığın yol
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Auteur", name: "author", widget: "string", default: "Kraffe Technics" }
      - { label: "Image de l'auteur", name: "authorImage", widget: "string", default: "@/images/blog/kraffe-technic.avif" }
      - { label: "Alt Image Auteur", name: "authorImageAlt", widget: "string", default: "Kraffe Technics Team Avatar" }
      - { label: "Date de publication", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Image de couverture", name: "cardImage", widget: "image" }
      - { label: "Alt Image Couverture", name: "cardImageAlt", widget: "string" }
      - { label: "Temps de lecture", name: "readTime", widget: "number" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Contenu", name: "body", widget: "markdown" }

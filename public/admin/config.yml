# This config is now loaded via manual initialization in index.html
# This file is kept for reference but not used directly

# You can delete this file or keep it as backup
# The actual configuration is now in the index.html file
backend:
  name: git-gateway
  repo: tacibey/kraffe6
  branch: main
  
  commit_messages:
    create: "Oluşturuldu: {{collection}} - {{slug}}"
    update: "Güncellendi: {{collection}} - {{slug}}"
    delete: "Silindi: {{collection}} - {{slug}}"
    uploadMedia: "Medya yüklendi: {{path}}"
    deleteMedia: "Medya silindi: {{path}}"

# Site ayarları
site_url: https://krafferoasters.com
display_url: https://krafferoasters.com
logo_url: /images/kraffe-logo.png

# Medya ayarları
media_folder: "src/images/blog"
public_folder: "@/images/blog"

# Koleksiyonlar - SENİN YAPINA GÖRE DÜZENLENECEK
collections:
  # Blog yazıları - İngilizce
  - name: "blog_en"
    label: "Blog (English)"
    folder: "src/content/blog/en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", required: true }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "Kraffe Team" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Content", name: "body", widget: "markdown" }

  # Blog yazıları - Fransızca
  - name: "blog_fr"
    label: "Blog (Français)"
    folder: "src/content/blog/fr"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string", required: true }
      - { label: "Date de publication", name: "pubDate", widget: "datetime", required: true }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Auteur", name: "author", widget: "string", default: "Équipe Kraffe" }
      - { label: "Image héro", name: "heroImage", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }

  # Ürünler - İngilizce
  - name: "products_en"
    label: "Products (English)"
    folder: "src/content/products/en"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "string", default: "roaster" }
      - { label: "Main Image", name: "mainImage", widget: "image", required: true }
      - { label: "Gallery Images", name: "gallery", widget: "list", required: false, fields: [{label: "Image", name: "image", widget: "image"}] }
      - { label: "Features", name: "features", widget: "list", required: false }
      - { label: "Content", name: "body", widget: "markdown" }

  # Ürünler - Fransızca
  - name: "products_fr"
    label: "Produits (Français)"
    folder: "src/content/products/fr"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string", required: true }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Catégorie", name: "category", widget: "string", default: "torréfacteur" }
      - { label: "Image principale", name: "mainImage", widget: "image", required: true }
      - { label: "Galerie d'images", name: "gallery", widget: "list", required: false, fields: [{label: "Image", name: "image", widget: "image"}] }
      - { label: "Caractéristiques", name: "features", widget: "list", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }

  # Insights - İngilizce
  - name: "insights_en"
    label: "Insights (English)"
    folder: "src/content/insights/en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Date", name: "pubDate", widget: "datetime", required: true }
      - { label: "Summary", name: "description", widget: "text" }
      - { label: "Featured Image", name: "heroImage", widget: "image", required: true }
      - { label: "Content", name: "body", widget: "markdown" }

  # Insights - Fransızca
  - name: "insights_fr"
    label: "Insights (Français)"
    folder: "src/content/insights/fr"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string", required: true }
      - { label: "Date", name: "pubDate", widget: "datetime", required: true }
      - { label: "Résumé", name: "description", widget: "text" }
      - { label: "Image en vedette", name: "heroImage", widget: "image", required: true }
      - { label: "Contenu", name: "body", widget: "markdown" }
